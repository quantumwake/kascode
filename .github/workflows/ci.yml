name: ci

on:
  push:
    branches: [main, v3]
  pull_request:

jobs:
  check:
    # CPU-only: the characterization suite runs without model weights or a GPU,
    # so CI needs no Apple-silicon runner. (MLX-bound code stays untested here.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync (dev extra)
        run: uv sync --extra dev

      - name: Lint (ruff check + format)  # BLOCKING gate
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check (mypy)  # informational until the per-phase ratchet (docs/v3/PLAN.md)
        run: uv run mypy --config-file pyproject.toml agent/ server/ || true

      - name: Tests + coverage  # BLOCKING gate (coverage config + --cov-fail-under in pyproject)
        run: uv run pytest

      - name: Coverage summary  # standard Cobertura -> PR comment + job summary (no token needed)
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: coverage.xml
          format: markdown
          badge: true
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "50 75"  # red < 50 < orange < 75 < green

      - name: Comment coverage on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ github.event_name == 'pull_request' && always() }}
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Coverage to job summary
        if: always()
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage.xml
            htmlcov/
