[project]
name = "kas"
version = "0.1.0"
description = "Anthropic Messages API-compatible server backed by a local MLX model, plus an agentic loop client"
requires-python = ">=3.11"
dependencies = [
    "mlx-lm>=0.24",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "anthropic>=0.109",
    "huggingface-hub",
    "textual>=8.2.7",
    "ddgs>=8.0",
    "trafilatura>=2.0.0",
]

[project.scripts]
kas = "agent.main:main"
kas-server = "server.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agent", "server", "scripts"]
